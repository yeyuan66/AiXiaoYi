[pytest]
# pytest 配置文件

# 测试搜索路径
testpaths = tests

# 测试文件命名模式
python_files = test_*.py

# 测试类命名模式
python_classes = Test*

# 测试函数命名模式
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    unit: 标记单元测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 最小 Python 版本
minversion = 7.0

# 测试发现模式
norecursedirs = .venv .git .idea node_modules __pycache__
